<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Guitarras</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Cadastro de Guitarras</h1>
  <nav>
    <a href="#">Guitarras</a>
    <a href="#">Marcas</a>
    <a href="#">Modelos</a>
    <a href="#">Sair</a>
  </nav>
</header>

<main>

  <section class="card">
    <h2>Lista de Guitarras</h2>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Madeira Braço</th>
          <th>Modelo</th>
          <th>Marca</th>
          <th>Corda</th>
          <th>Luthier</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Maple</td>
          <td>Stratocaster</td>
          <td>Fender</td>
          <td>0.10</td>
          <td>João</td>
          <td>
            <button class="btn edit">Editar</button>
            <button class="btn delete">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>

  </section>

</main>

</body>
</html>
